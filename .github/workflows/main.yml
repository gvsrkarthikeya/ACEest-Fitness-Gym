name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-lint-test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Lint (syntax check)
        run: |
          python -m py_compile app.py program_data.py
      - name: Run tests
        run: |
          python3 -m pytest
      - name: Build Docker image
        run: |
          docker build -t aceest-fitness-gym .
      - name: Test in Docker container
        run: |
          docker run --rm aceest-fitness-gym python3 -m pytest
