<!DOCTYPE html>
<html>
<head>
    <title>ACEest Fitness and Gym</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Arial; }
        .header { background: #d4af37; color: #000; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { margin: 40px auto; width: 600px; background: #222; padding: 30px; border-radius: 10px; }
        .select { margin-bottom: 20px; }
        .workout { color: {{ color }}; margin-bottom: 20px; }
        .diet { margin-bottom: 20px; }
        .metrics { background: #333; color: #ddd; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">ACEest FUNCTIONAL FITNESS</div>
    <div class="container">
        <form method="post">
            <div class="select">
                <label for="profile">Select Program:</label>
                <select name="profile" id="profile">
                    {% for key in programs.keys() %}
                        <option value="{{ key }}" {% if key == selected %}selected{% endif %}>{{ key }}</option>
                    {% endfor %}
                </select>
                <button type="submit">View</button>
            </div>
        </form>
        <div class="metrics">
            CAPACITY: 150 Users<br>
            AREA: 10,000 sq ft<br>
            BREAK-EVEN: 250 Members
        </div>
        <div class="workout">
            <strong>Weekly Workout Chart:</strong><br>
            {{ workout|safe }}
        </div>
        <div class="diet">
            <strong>Daily Nutrition Plan (Tamil Nadu Context):</strong><br>
            {{ diet|safe }}
        </div>
    </div>
</body>
</html>
